{% extends "base.html" %}

{% block title %}{{request.app.title}}{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] gap-8">

    <!-- Illustration -->
    <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" class="w-72 opacity-90">
        <ellipse cx="160" cy="200" rx="130" ry="12" fill="#e0e7ff"/>
        <rect x="40" y="108" width="240" height="8" rx="4" fill="#6366f1"/>
        <rect x="32" y="88" width="16" height="48" rx="4" fill="#4338ca"/>
        <rect x="20" y="94" width="14" height="36" rx="3" fill="#3730a3"/>
        <rect x="272" y="88" width="16" height="48" rx="4" fill="#4338ca"/>
        <rect x="286" y="94" width="14" height="36" rx="3" fill="#3730a3"/>
        <rect x="132" y="70" width="56" height="80" rx="16" fill="#818cf8"/>
        <rect x="132" y="126" width="56" height="26" rx="8" fill="#4338ca"/>
        <path d="M132 90 C100 80 72 95 56 112" stroke="#818cf8" stroke-width="18" stroke-linecap="round" fill="none"/>
        <path d="M188 90 C220 80 248 95 264 112" stroke="#818cf8" stroke-width="18" stroke-linecap="round" fill="none"/>
        <circle cx="56" cy="112" r="10" fill="#818cf8"/>
        <circle cx="264" cy="112" r="10" fill="#818cf8"/>
        <rect x="138" y="150" width="20" height="50" rx="8" fill="#3730a3"/>
        <rect x="162" y="150" width="20" height="50" rx="8" fill="#3730a3"/>
        <rect x="130" y="190" width="36" height="12" rx="5" fill="#f97316"/>
        <rect x="154" y="190" width="36" height="12" rx="5" fill="#f97316"/>
        <circle cx="160" cy="54" r="26" fill="#818cf8"/>
        <path d="M136 46 Q160 34 184 46" stroke="#f97316" stroke-width="6" stroke-linecap="round" fill="none"/>
        <circle cx="151" cy="54" r="4" fill="white"/>
        <circle cx="169" cy="54" r="4" fill="white"/>
        <circle cx="152" cy="55" r="2" fill="#1e1b4b"/>
        <circle cx="170" cy="55" r="2" fill="#1e1b4b"/>
    </svg>

    <!-- Title -->
    <div class="text-center">
        <h1 class="text-3xl font-bold text-indigo-700 dark:text-indigo-400 mb-2">{{request.app.title}}</h1>
        <p class="text-gray-500 dark:text-gray-400">{{request.app.description}}</p>
    </div>

    <!-- Auth buttons -->
    <div class="flex flex-wrap justify-center gap-3">
        <a href="/api/views/users/login"
           class="px-6 py-2.5 rounded-xl border-2 border-indigo-600 text-indigo-600
                  dark:border-indigo-400 dark:text-indigo-400
                  font-semibold hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition">
            Войти
        </a>
        <a href="/api/views/users/signup"
           class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold transition">
            Зарегистрироваться
        </a>
        <a href="/api/views/users/me"
           class="px-6 py-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-700
                  dark:text-gray-200 font-semibold hover:bg-gray-200 dark:hover:bg-gray-600 transition">
            Личный кабинет
        </a>
    </div>

</div>
{% endblock %}
