{% extends "base.html" %}

{% block title %}Вход — {{request.app.title}}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-6">
    <h1 class="text-2xl font-bold text-indigo-700 dark:text-indigo-400 mb-6">Вход</h1>

    <!-- Error banner -->
    <div id="error-banner"
         class="hidden mb-4 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-900/30
                border border-red-200 dark:border-red-700
                text-red-700 dark:text-red-400 text-sm">
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6 flex flex-col gap-4">

        <!-- Username -->
        <div>
            <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                Имя пользователя
            </label>
            <input id="username" type="text" required autocomplete="username"
                   class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2
                          bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                          focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>

        <!-- Password -->
        <div>
            <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                Пароль
            </label>
            <input id="password" type="password" required autocomplete="current-password"
                   class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2
                          bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                          focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>

        <!-- Submit -->
        <button id="submit-btn" type="button"
                class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50
                       text-white font-semibold py-2.5 rounded-xl transition
                       flex items-center justify-center gap-2">
            <span id="submit-label">Войти</span>
            <svg id="spinner" class="hidden animate-spin h-4 w-4 text-white"
                 xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
        </button>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400">
            Нет аккаунта?
            <a href="/api/views/users/signup" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline">Зарегистрироваться</a>
        </p>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Разрешаем отправку по Enter в любом поле
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
    });

    document.getElementById('submit-btn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('Пожалуйста, заполните все поля.');
            return;
        }

        setLoading(true);
        hideError();

        try {
            // OAuth2PasswordRequestForm — /token ожидает form-urlencoded
            const tokenData = new URLSearchParams();
            tokenData.append('username', username);
            tokenData.append('password', password);

            const tokenRes = await fetch('/api/v1/users/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: tokenData
            });

            if (!tokenRes.ok) {
                const err = await tokenRes.json().catch(() => ({}));
                throw new Error(err.detail || `Неверный логин или пароль (${tokenRes.status})`);
            }

            const { access_token } = await tokenRes.json();

            // Сохраняем токен в cookie и переходим в личный кабинет
            document.cookie = `access_token=${access_token}; path=/; SameSite=Strict`;
            window.location.href = '/api/views/users/me';

        } catch (e) {
            showError(e.message);
        } finally {
            setLoading(false);
        }
    });

    function setLoading(on) {
        const btn = document.getElementById('submit-btn');
        btn.disabled = on;
        document.getElementById('spinner').classList.toggle('hidden', !on);
        document.getElementById('submit-label').textContent = on ? 'Подождите...' : 'Войти';
    }

    function showError(msg) {
        const b = document.getElementById('error-banner');
        b.textContent = msg;
        b.classList.remove('hidden');
    }

    function hideError() {
        document.getElementById('error-banner').classList.add('hidden');
    }
</script>
{% endblock %}
